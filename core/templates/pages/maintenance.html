<!DOCTYPE html>
<html lang="pt">
<head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Plataforma em Manutenção</title>
    <link rel="stylesheet" href="{% static 'css/fontawesome.css' %}">
    <link rel="stylesheet" href="{% static 'css/templatemo-cyborg-gaming.css' %}">
    <style>
        body {
            background-color: #1f2122;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #fff;
            text-align: center;
        }
        .maintenance-container {
            background-color: #27292a;
            padding: 60px;
            border-radius: 23px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 600px;
        }
        .maintenance-container i {
            font-size: 80px;
            color: #e75e8d;
            margin-bottom: 20px;
        }
        .maintenance-container h1 {
            font-size: 36px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .maintenance-container p {
            color: #666;
            font-size: 18px;
            line-height: 28px;
        }
        .main-button a {
            margin-top: 30px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <i class="fa fa-cog fa-spin"></i>
        <h1>Plataforma em Manutenção</h1>
        <p>Estamos realizando atualizações importantes para melhorar sua experiência. Voltaremos em breve!</p>
        <div class="main-button">
            <a href="{% url 'login' %}">Acesso Admin</a>
        </div>
    </div>
</body>
</html>
