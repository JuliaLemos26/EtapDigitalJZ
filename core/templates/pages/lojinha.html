<html lang="pt" dir="ltr">
    <head>
        {% load static %}
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
        <title>Angariacoes</title>
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
        <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="{% static 'css/fontawesome.css' %}">
        <link rel="stylesheet" href="{% static 'css/templatemo-cyborg-gaming.css' %}">
        <link rel="stylesheet" href="{% static 'css/owl.css' %}">
        <link rel="stylesheet" href="{% static 'css/animate.css' %}">
        <link rel="stylesheet"href="https://unpkg.com/swiper@7/swiper-bundle.min.css"/>
    </head>
    <body>
        <!-- ***** Preloader Start ***** -->
        <div class="container">
            <div class="row">
                <div class="col-lg-12">

                    <div class="most-popular">
                        <div class="row">
                            <div class="col-lg-12">
                                <div class="dropdown">
                                    <input type="checkbox" id="dropdown-toggle">
                                    <label class="dropdown__face" for="dropdown-toggle">
                                        <div class="dropdown__text">Filtrar</div>
                                        <div class="dropdown__arrow"></div>
                                    </label>
                                    <ul class="dropdown__items">
                                        <li><a class="dropdown-item" href="javascript:;" onclick="window.sortOutfits('newest')">Novidades</a></li>
                                        <li><a class="dropdown-item" href="javascript:;" onclick="window.sortOutfits('price_asc')">Mais Baratos</a></li>
                                        <li><a class="dropdown-item" href="javascript:;" onclick="window.sortOutfits('price_desc')">Mais Caros</a></li>
                                    </ul>
                                </div>
                                <div class="heading-section">
                                    <h4>Lojinha</h4>
                                </div>
                                <div class="row" id="lojinha-items-grid">
                                    <div class="col-12 text-center" style="padding: 40px;">
                                        <i class="bx bx-loader-alt bx-spin" style="font-size: 40px; color: #e75e8d;"></i>
                                        <p style="color: #666; margin-top: 10px;">Carregando vitrine...</p>
                                    </div>
                                </div>
                                <div class="pagination-wrapper">
                                    <div class="pagination" id="lojinha-pagination">
                                        <!-- Gerado dinamicamente -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ***** Modal Provador Premium ***** -->
        <div class="modal-overlay" id="js-provador-overlay"></div>
        <div class="modal-holder" id="js-provador-holder" style="max-width: 500px; padding: 0; border: none; overflow: hidden; background: #fff; box-shadow: 0 15px 35px rgba(0,0,0,0.2);">
            <div class="modal__close" id="js-provador-close" style="z-index: 1000; color: white; background: rgba(0,0,0,0.2); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; top: 15px; right: 15px; position: absolute; cursor: pointer;">
                <i class='bx bx-x'></i>
            </div>
            
            <!-- Header com Gradiente Premium -->
            <div style="padding: 30px 25px; background: linear-gradient(135deg, #e75e8d 0%, #ff89ab 100%); color: white; text-align: center; position: relative;">
                <h4 style="margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px;">Provador Digital</h4>
                <p style="margin: 5px 0 0 0; font-size: 13px; opacity: 0.9; font-weight: 500;">Visualize o seu novo look antes de comprar</p>
                <!-- Curva Decorativa no fundo -->
                <div style="position: absolute; bottom: -1px; left: 0; width: 100%; height: 20px; background: #fff; border-radius: 20px 20px 0 0;"></div>
            </div>

            <div class="modal__body-custom" style="padding: 0 30px 30px 30px; display: flex; flex-direction: column; align-items: center;">
                <!-- Palco de Visualização (Stage) -->
                <div style="background: #f8f9fa; background-image: radial-gradient(#e75e8d11 1px, transparent 1px); background-size: 20px 20px; border-radius: 20px; border: 1px solid #eee; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05); width: 400px; height: 500px; position: relative; overflow: hidden; margin-top: 5px; margin-bottom: 25px;" id="provador-stage">
                    <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
                        <i class='bx bx-loader-alt bx-spin' style="font-size: 30px; color: #e75e8d;"></i>
                    </div>
                </div>
                
                <!-- Info do Item -->
                <div style="width: 100%; display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 25px; border-bottom: 1px solid #f1f1f1; padding-bottom: 15px;">
                    <div style="text-align: left;">
                        <span id="provador-item-author" style="font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; display: block; margin-bottom: 2px;"></span>
                        <h5 id="provador-item-name" style="margin: 0; font-size: 20px; color: #222; font-weight: 800;">Nome da Roupa</h5>
                    </div>
                    <div style="text-align: right;">
                        <div style="background: #f1c40f22; color: #f39c12; padding: 5px 12px; border-radius: 12px; font-weight: 800; font-size: 16px; display: flex; align-items: center; gap: 4px;">
                            <i class='bx bxs-star'></i> <span id="provador-item-price">0</span>
                        </div>
                    </div>
                </div>

                <div style="width: 100%; display: flex; gap: 15px;">
                    <button id="btn-comprar-outfit" style="background: linear-gradient(135deg, #e75e8d 0%, #fd4a8b 100%); color: white; border: none; padding: 14px; border-radius: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(231, 94, 141, 0.3);">
                        <i class='bx bxs-cart-add' style="font-size: 20px;"></i> Adquirir agora
                    </button>
                </div>
                <div id="provador-msg" style="text-align: center; margin-top: 15px; font-size: 13px; font-weight: 700; color: #e75e8d;"></div>
            </div>
        </div>

        <script>
            (function() {
                var currentOutfits = [];
                var userPoints = 0;
                var baseAvatarParts = [];
                var currentPage = 1;
                const itemsPerPage = 18;

                // --- QUACK SOUND logic ---
                const _quackAudio = new Audio('/static/sounds/quack.mp3');
                _quackAudio.volume = 0.6;
                function _playQuack() {
                    _quackAudio.currentTime = 0;
                    _quackAudio.play().catch(() => {}); 
                }
                // --- END QUACK ---

                function getCookie(name) {
                    let cookieValue = null;
                    if (document.cookie && document.cookie !== '') {
                        const cookies = document.cookie.split(';');
                        for (let i = 0; i < cookies.length; i++) {
                            const cookie = cookies[i].trim();
                            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                                break;
                            }
                        }
                    }
                    return cookieValue;
                }

                function loadLojinha() {
                    Promise.all([
                        fetch('/api/lojinha/').then(res => res.json()),
                        fetch('/api/profile/').then(res => res.json())
                    ]).then(([lojinhaData, profileData]) => {
                        if(lojinhaData.status === 'success') {
                            currentOutfits = lojinhaData.outfits || [];
                            userPoints = lojinhaData.pontos || 0;
                        }
                        if(profileData.status === 'success') {
                            baseAvatarParts = profileData.avatar_parts || [];
                        }
                        renderPage(1);
                    }).catch(err => {
                        console.error("Erro ao carregar dados:", err);
                        const grid = document.getElementById('lojinha-items-grid');
                        if(grid) grid.innerHTML = '<div class="col-12 text-center" style="padding: 30px; color: #ff5e8d;">Erro de conexão. Por favor, recarregue a página.</div>';
                    });
                }

                function renderPage(page) {
                    try {
                        currentPage = page;
                        const grid = document.getElementById('lojinha-items-grid');
                        if(!grid) return;
                        grid.innerHTML = '';
                        
                        const start = (page - 1) * itemsPerPage;
                        const end = start + itemsPerPage;
                        const paginatedItems = currentOutfits.slice(start, end);

                        if (paginatedItems.length === 0) {
                            grid.innerHTML = '<div class="col-12 text-center" style="padding: 30px; color: #888;">Nenhum item disponível na lojinha.</div>';
                            return;
                        }

                        paginatedItems.forEach(outfit => {
                            try {
                                const col = document.createElement('div');
                                col.className = 'col-lg-2 col-md-4 col-sm-6';
                                
                                const boughtBadge = outfit.purchased ? `<div style="position: absolute; top: 10px; right: 10px; background: #27ae60; color: white; font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: bold; z-index: 200;"><i class='bx bx-check'></i> COMPRADO</div>` : '';
                                
                                const authorBadge = outfit.creator 
                                    ? "<div style='font-size: 10px; color: #666; margin-top: 8px;'>Por: <strong>" + outfit.uploader + "</strong> <br>c/ <strong>" + (outfit.creator || '---') + "</strong></div>"
                                    : "<div style='font-size: 10px; color: #666; margin-top: 8px;'>Por: <strong>" + outfit.uploader + "</strong></div>";

                                const itemDiv = document.createElement('div');
                                itemDiv.className = 'item-pequeno-standard';
                                itemDiv.style.cursor = 'pointer';
                                itemDiv.onclick = () => window.openProvador(outfit.id);
                                
                                const stage = document.createElement('div');
                                stage.style.height = '240px';
                                stage.style.width = '100%';
                                stage.style.position = 'relative';
                                stage.style.overflow = 'hidden';
                                stage.style.background = 'rgba(255,255,255,0.05)';
                                stage.style.borderRadius = '15px';
                                stage.style.marginBottom = '10px';

                                if ((!outfit.parts || outfit.parts.length === 0) && outfit.preview_image) {
                                    const fallbackImg = document.createElement('img');
                                    fallbackImg.src = outfit.preview_image;
                                    fallbackImg.style.width = '100%';
                                    fallbackImg.style.height = '100%';
                                    fallbackImg.style.objectFit = 'contain';
                                    stage.appendChild(fallbackImg);
                                } else {
                                    const inner = document.createElement('div');
                                    inner.style.width = '400px';
                                    inner.style.height = '500px';
                                    inner.style.position = 'absolute';
                                    inner.style.top = '0';
                                    inner.style.left = '50%';
                                    inner.style.marginLeft = '-90px'; 
                                    inner.style.transform = 'scale(0.45)';
                                    inner.style.transformOrigin = 'top left';
                                    inner.style.pointerEvents = 'none';

                                    // Renderizar APENAS a roupa no Card (conforme solicitado)
                                    const cardParts = [...(outfit.parts || [])];
                                    cardParts.sort((a, b) => parseInt(a.z_index || 0) - parseInt(b.z_index || 0));

                                    cardParts.forEach(ly => {
                                        if (!ly.image) return;
                                        const wrapper = document.createElement('div');
                                        wrapper.style.position = 'absolute';
                                        wrapper.style.left = (ly.pos_x || 0) + 'px';
                                        wrapper.style.top = (ly.pos_y || 0) + 'px';
                                        wrapper.style.zIndex = (parseInt(ly.z_index || 0) + 100);
                                        
                                        const img = document.createElement('img');
                                        img.src = ly.image;
                                        img.style.maxWidth = 'none';
                                        img.style.maxHeight = 'none';
                                        img.style.borderRadius = '0';
                                        img.style.transform = `scale(${ly.scale || 1.0})`;
                                        img.style.transformOrigin = 'top left';
                                        
                                        wrapper.appendChild(img);
                                        inner.appendChild(wrapper);
                                    });
                                    stage.appendChild(inner);
                                }
                                
                                itemDiv.innerHTML = boughtBadge;
                                itemDiv.appendChild(stage);
                                itemDiv.innerHTML += `
                                    <div class="item-info-lojinha">
                                        <h4>${outfit.name}</h4>
                                        <div class="price-tag-lojinha">
                                            <i class='bx bxs-star'></i> ${outfit.price}
                                        </div>
                                        ${authorBadge}
                                    </div>`;
                                
                                col.appendChild(itemDiv);
                                grid.appendChild(col);
                            } catch (e) {
                                console.error("Erro ao renderizar card de outfit:", e);
                            }
                        });

                        renderPagination();
                    } catch (err) {
                        console.error("Erro geral na vitrine:", err);
                    }
                }

                function renderPagination() {
                    const totalPages = Math.ceil(currentOutfits.length / itemsPerPage);
                    const pagination = document.getElementById('lojinha-pagination');
                    if(!pagination) return;
                    if(totalPages <= 1) {
                        pagination.innerHTML = '';
                        return;
                    }

                    let html = '';
                    if(currentPage > 1) {
                        html += `<a class="prev page-numbers" href="javascript:;" onclick="window.renderLojinhaPage(${currentPage - 1})">prev</a>`;
                    }
                    
                    for(let i = 1; i <= totalPages; i++) {
                        if(i === currentPage) {
                            html += `<span aria-current="page" class="page-numbers current">${i}</span>`;
                        } else {
                            html += `<a class="page-numbers" href="javascript:;" onclick="window.renderLojinhaPage(${i})">${i}</a>`;
                        }
                    }

                    if(currentPage < totalPages) {
                        html += `<a class="next page-numbers" href="javascript:;" onclick="window.renderLojinhaPage(${currentPage + 1})">next</a>`;
                    }

                    pagination.innerHTML = html;
                }

                // Expondo globalmente apenas as chamadas que vêm dos elementos HTML onclick
                window.renderLojinhaPage = function(page) {
                    renderPage(page);
                };

                window.sortOutfits = function(type) {
                    if (type === 'price_asc') {
                        currentOutfits.sort((a, b) => a.price - b.price);
                    } else if (type === 'price_desc') {
                        currentOutfits.sort((a, b) => b.price - a.price);
                    } else {
                        // Novidades: IDs maiores primeiro
                        currentOutfits.sort((a, b) => b.id - a.id);
                    }
                    renderPage(1);
                    // Fechar dropdown
                    const toggle = document.getElementById('dropdown-toggle');
                    if (toggle) toggle.checked = false;
                };

                window.openProvador = function(outfitId) {
                    _playQuack(); // 🦆 Grasnar ao abrir!
                    const outfit = currentOutfits.find(o => o.id === outfitId);
                    if(!outfit) return;

                    const stage = document.getElementById('provador-stage');
                    if(!stage) return;
                    stage.innerHTML = '';

                    // Wrapper de Animação (Respiração)
                    const breathe = document.createElement('div');
                    breathe.className = 'duck-mini-breathe';
                    breathe.style.position = 'absolute';
                    breathe.style.inset = '0';
                    breathe.style.transformOrigin = 'bottom center';
                    stage.appendChild(breathe);

                    // Separar e marcar partes para lógica de z-index
                    const baseParts = (baseAvatarParts || []).map(p => ({ ...p, is_base: true }));
                    const outfitParts = (outfit.parts || []).map(p => ({ ...p, is_base: false }));
                    
                    // Ordem absoluta do BD (para ordem de inserção no DOM)
                    const allParts = [...baseParts, ...outfitParts].sort((a, b) => parseInt(a.z_index || 0) - parseInt(b.z_index || 0));
                    
                    allParts.forEach(p => {
                        if (!p.image) return;
                        const wrapper = document.createElement('div');
                        wrapper.style.position = 'absolute';
                        wrapper.style.left = (p.pos_x || 0) + 'px';
                        wrapper.style.top = (p.pos_y || 0) + 'px';
                        // Pato = 100 fixo (como no Editor), Roupa = 100 + Z
                        wrapper.style.zIndex = p.is_base ? 100 : (parseInt(p.z_index || 0) + 100);
                        wrapper.style.pointerEvents = 'none';

                        const img = document.createElement('img');
                        img.src = p.image;
                        img.dataset.label = p.label || ''; // Para lógica de piscar
                        img.style.maxWidth = 'none'; 
                        img.style.maxHeight = 'none';
                        img.style.display = 'block';
                        img.style.borderRadius = '0';
                        
                        const sc = (p.scale || 1.0);
                        img.style.transform = `scale(${sc})`;
                        img.style.transformOrigin = 'top left'; 
                        
                        wrapper.appendChild(img);
                        breathe.appendChild(wrapper);
                    });

                    // BLINK LOGIC (Piscar) - Baseado em labels
                    const eyeWrappers = Array.from(breathe.children).filter(w => {
                        const img = w.querySelector('img');
                        const label = (img.dataset.label || '').toLowerCase();
                        return label.includes('olho') || label.includes('eye');
                    });
                    const openEyes = eyeWrappers.filter(w => !w.querySelector('img').dataset.label.toLowerCase().includes('fechad') && !w.querySelector('img').dataset.label.toLowerCase().includes('pisc'));
                    const closedEyes = eyeWrappers.filter(w => w.querySelector('img').dataset.label.toLowerCase().includes('fechad') || w.querySelector('img').dataset.label.toLowerCase().includes('pisc'));
                    
                    if (closedEyes.length > 0) {
                        closedEyes.forEach(e => e.style.opacity = '0');
                        const blinkInterval = setInterval(() => {
                            if (!document.getElementById('js-provador-holder').classList.contains('show')) {
                                clearInterval(blinkInterval);
                                return;
                            }
                            openEyes.forEach(e => e.style.opacity = '0');
                            closedEyes.forEach(e => e.style.opacity = '1');
                            setTimeout(() => {
                                openEyes.forEach(e => e.style.opacity = '1');
                                closedEyes.forEach(e => e.style.opacity = '0');
                            }, 150);
                        }, 4000);
                    }

                    document.getElementById('provador-item-name').innerText = outfit.name;
                    document.getElementById('provador-item-price').innerText = outfit.price;
                    document.getElementById('provador-item-author').innerHTML = outfit.creator 
                        ? "Por <strong>" + outfit.uploader + "</strong> c/ <strong>" + outfit.creator + "</strong>" 
                        : "Por <strong>" + outfit.uploader + "</strong>";

                    const btn = document.getElementById('btn-comprar-outfit');
                    const msg = document.getElementById('provador-msg');
                    msg.innerText = '';
                    
                    if (outfit.purchased) {
                        btn.style.background = '#27ae60';
                        btn.innerHTML = "<i class='bx bx-check'></i> Já Possui";
                        btn.disabled = true;
                        btn.style.cursor = 'not-allowed';
                        btn.style.opacity = '0.8';
                    } else if (userPoints < outfit.price) {
                        btn.style.background = '#aaa';
                        btn.innerHTML = "<i class='bx bx-block'></i> Pontos Insuficientes";
                        btn.disabled = true;
                        btn.style.cursor = 'not-allowed';
                        btn.style.opacity = '0.8';
                    } else {
                        btn.style.background = 'linear-gradient(135deg, #e75e8d 0%, #fd4a8b 100%)';
                        btn.innerHTML = "<i class='bx bxs-cart-add'></i> Adquirir agora";
                        btn.disabled = false;
                        btn.style.cursor = 'pointer';
                        btn.style.opacity = '1';
                        btn.onclick = () => window.buyOutfit(outfit.id);
                    }

                    document.getElementById('js-provador-overlay').classList.add('show');
                    document.getElementById('js-provador-holder').classList.add('show');
                };

                window.buyOutfit = function(outfitId) {
                    const formData = new FormData();
                    formData.append('outfit_id', outfitId);

                    const btn = document.getElementById('btn-comprar-outfit');
                    btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Processando...";
                    btn.disabled = true;

                    fetch('/api/lojinha/buy/', {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        const msg = document.getElementById('provador-msg');
                        if(data.status === 'success') {
                            msg.style.color = '#27ae60';
                            msg.innerText = data.message;
                            userPoints = data.new_pontos;
                            
                            btn.style.background = '#27ae60';
                            btn.innerHTML = "<i class='bx bx-check'></i> Comprado com Sucesso";
                            
                            const ptsDisplay = document.querySelector('.score-display');
                            if (ptsDisplay) {
                                ptsDisplay.innerHTML = `<i class='bx bx-star'></i> ${userPoints}`;
                            }
                            
                            // Atualizar pontos globalmente (Top-right e Perfil)
                            if (window.updateAllPointsDisplay) window.updateAllPointsDisplay(userPoints);



                            const outfit = currentOutfits.find(o => o.id === outfitId);
                            if(outfit) outfit.purchased = true;
                            
                            setTimeout(() => {
                                renderPage(currentPage);
                                document.getElementById('js-provador-overlay').classList.remove('show');
                                document.getElementById('js-provador-holder').classList.remove('show');
                            }, 1500);

                        } else {
                            msg.style.color = '#e74c3c';
                            msg.innerText = data.message;
                            btn.innerHTML = "<i class='bx bx-error'></i> Erro na Compra";
                            btn.disabled = false;
                        }
                    }).catch(err => {
                        const msg = document.getElementById('provador-msg');
                        if(msg) msg.innerText = "Erro ao se conectar...";
                    });
                };

                const closeProvador = () => {
                    const overlay = document.getElementById('js-provador-overlay');
                    const holder = document.getElementById('js-provador-holder');
                    if(overlay) overlay.classList.remove('show');
                    if(holder) holder.classList.remove('show');
                };

                const closeBtn = document.getElementById('js-provador-close');
                const overlay = document.getElementById('js-provador-overlay');
                
                if (closeBtn) closeBtn.onclick = closeProvador;
                if (overlay) overlay.onclick = (e) => { 
                    if(e.target === overlay) closeProvador(); 
                };

                // Carrega imediatamente as listas ao acoplar o script na DOM
                window.closeProvador = function() {
                    document.getElementById('js-provador-overlay').classList.remove('show');
                    document.getElementById('js-provador-holder').classList.remove('show');
                };

                document.getElementById('js-provador-close').onclick = window.closeProvador;
                // Estilos para animação do Pato
                const style = document.createElement('style');
                style.innerHTML = `
                    @keyframes duckBreatheProvador {
                        0% { transform: scaleY(1); }
                        50% { transform: scaleY(1.03) translateY(-2px); }
                        100% { transform: scaleY(1); }
                    }
                    .duck-mini-breathe {
                        animation: duckBreatheProvador 3.5s ease-in-out infinite;
                    }

                    /* Padronização Lojinha - Cores Originais Restauradas */
                    .item-pequeno-standard {
                        background-color: #FAFAFC;
                        padding: 15px;
                        border-radius: 20px;
                        margin-bottom: 30px;
                        transition: all .3s;
                        height: 400px;
                        display: flex;
                        flex-direction: column;
                        position: relative;
                        border: 1px solid rgba(0,0,0,0.05);
                        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
                    }
                    .item-pequeno-standard:hover {
                        background-color: #fff;
                        transform: translateY(-5px);
                        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
                    }
                    .item-info-lojinha {
                        margin-top: 10px;
                        flex-grow: 1;
                        display: flex;
                        flex-direction: column;
                        justify-content: space-between;
                        text-align: center;
                    }
                    .item-info-lojinha h4 {
                        font-size: 15px;
                        font-weight: 700;
                        margin-bottom: 5px;
                        color: #1C1C1E;
                        overflow: hidden;
                        text-overflow: ellipsis;
                        white-space: nowrap;
                    }
                    .price-tag-lojinha {
                        color: #ec6090;
                        font-weight: 800;
                        font-size: 14px;
                    }
                `;
                document.head.appendChild(style);

                loadLojinha();
            })();
        </script>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            <div class="container">
            <div class="row">
                <div class="col-lg-12">
                <p>Uma plataforma de estutantes <a href="#">ETAP</a> para estudantes ETAP.
